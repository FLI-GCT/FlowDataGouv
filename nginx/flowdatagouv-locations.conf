# FlowDataGouv — Nginx locations (inclus par le server block)
# Copier dans : /etc/nginx/snippets/flowdatagouv-locations.conf

client_max_body_size 1m;
proxy_hide_header X-Powered-By;

# Gzip
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_min_length 1000;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

# Assets statiques Next.js (immutable, cache 1 an)
location /_next/static/ {
    proxy_pass http://nextjs;
    expires 365d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Fichiers publics (favicon, etc.)
location /favicon.ico {
    proxy_pass http://nextjs;
    expires 30d;
    access_log off;
}

# MCP Server (Streamable HTTP)
location /mcp {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 300s;
    proxy_buffering off;
    chunked_transfer_encoding on;
}

# MCP health check
location = /mcp/health {
    proxy_pass http://127.0.0.1:8000/health;
}

# API sync — rate limit strict
location /api/sync/ {
    limit_req zone=sync burst=2 nodelay;
    limit_req_status 429;

    proxy_pass http://nextjs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 600s;
}

# API routes — rate limit modéré
location /api/ {
    limit_req zone=api burst=10 nodelay;
    limit_req_status 429;

    proxy_pass http://nextjs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_read_timeout 60s;
}

# Toutes les autres routes (pages Next.js)
location / {
    proxy_pass http://nextjs;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
}
