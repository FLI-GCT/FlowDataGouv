# FlowDataGouv — Nginx reverse proxy
# Optimisé pour 10 000 connexions simultanées
#
# Installation :
#   sudo cp nginx/flowdatagouv.conf /etc/nginx/sites-available/flowdatagouv
#   sudo ln -s /etc/nginx/sites-available/flowdatagouv /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream nextjs {
    least_conn;
    server 127.0.0.1:3000;
    server 127.0.0.1:3001;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=sync:10m rate=1r/m;

server {
    listen 80;
    server_name _;  # Remplacer par votre domaine

    # Redirection HTTPS (décommenter après certbot)
    # return 301 https://$host$request_uri;

    # --- En attendant le SSL, servir directement ---
    include /etc/nginx/snippets/flowdatagouv-locations.conf;
}

